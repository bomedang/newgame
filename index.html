<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Neon Skies</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  :root {
    color-scheme: dark;
    --bg: #050610;
    --panel: rgba(8, 12, 24, 0.88);
    --text: #c9f7ff;
    --muted: #8d9fb3;
    --accent: #75f0ff;
    --warn: #ff7d83;
    --prime: #ffdf7b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at 50% 0%, rgba(112,172,255,0.1), transparent 18%), var(--bg); color: var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 17px); z-index: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
  #hud { position: absolute; top: 18px; left: 18px; right: 18px; z-index: 2; display: grid; gap: 10px; pointer-events: none; }
  .box { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 16px 18px; border-radius: 18px; backdrop-filter: blur(14px); background: var(--panel); border: 1px solid rgba(116, 226, 255, 0.14); box-shadow: 0 0 36px rgba(0,0,0,0.24); }
  .label { color: var(--muted); letter-spacing: 0.12em; font-variant: petite-caps; font-size: 0.82rem; }
  .value { text-align: right; font-size: 0.95rem; }
  #log { position: absolute; left: 18px; bottom: 18px; z-index: 2; width: min(440px, calc(100vw - 36px)); max-height: 38vh; overflow: hidden; padding: 16px 18px; border-radius: 18px; backdrop-filter: blur(12px); background: rgba(6, 10, 18, 0.86); border: 1px solid rgba(110, 220, 255, 0.13); box-shadow: 0 0 34px rgba(0,0,0,0.22); font-size: 0.82rem; line-height: 1.5; }
  .log-line { margin: 0 0 8px; opacity: 0.92; }
  #tip { position: absolute; right: 18px; bottom: 18px; z-index: 2; padding: 14px 16px; width: min(260px, calc(100vw - 36px)); border-radius: 16px; background: rgba(8,12,22,0.82); border: 1px dashed rgba(120,214,255,0.16); color: var(--muted); font-size: 0.82rem; }
  #tip strong { color: var(--accent); }
  #launch { position: absolute; inset: 0; display: grid; place-items: center; z-index: 5; pointer-events: none; font-size: 1.1rem; text-align: center; color: rgba(197, 247, 255, 0.94); }
  #launch span { display: inline-block; padding: 18px 28px; border-radius: 999px; background: rgba(9, 14, 26, 0.86); border: 1px solid rgba(120, 225, 255, 0.16); box-shadow: 0 0 24px rgba(0,0,0,0.28); }
  @media (max-width: 640px) { #hud { left: 12px; right: 12px; top: 12px; } #log { left: 12px; right: 12px; bottom: 12px; max-height: 34vh; } #tip { right: 12px; bottom: 110px; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div class="box"><span class="label">WAVE</span><span class="value" id="waveValue">--</span></div>
  <div class="box"><span class="label">HEALTH</span><span class="value" id="healthValue">--</span></div>
  <div class="box"><span class="label">ENERGY</span><span class="value" id="energyValue">--</span></div>
  <div class="box"><span class="label">ANOMALY</span><span class="value" id="anomalyValue">--</span></div>
  <div class="box"><span class="label">SECRET</span><span class="value" id="secretValue">--</span></div>
</div>
<div id="log"></div>
<div id="tip"><strong>WASD</strong> move · <strong>SPACE</strong> fire · <strong>Q</strong> scan · <strong>SHIFT</strong> overdrive</div>
<div id="launch"><span>Press any key or tap to launch into the Neon Skies.</span></div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const waveEl = document.getElementById('waveValue');
  const healthEl = document.getElementById('healthValue');
  const energyEl = document.getElementById('energyValue');
  const anomalyEl = document.getElementById('anomalyValue');
  const secretEl = document.getElementById('secretValue');
  const logEl = document.getElementById('log');
  const launchEl = document.getElementById('launch');

  let width = 0;
  let height = 0;
  let dpr = window.devicePixelRatio || 1;

  const state = {
    started: false,
    time: 0,
    lastTime: 0,
    keys: {},
    player: { x: 0, y: 0, vx: 0, vy: 0, speed: 260, health: 100, energy: 100, overdrive: 0, radius: 12, cooldown: 0 },
    bullets: [],
    enemies: [],
    beams: [],
    anomalies: [],
    particles: [],
    wave: 1,
    score: 0,
    anomaly: 0,
    secrets: 0,
    scan: false,
    eventTimer: 0,
    eventRate: 3.8,
    glitch: 0,
    flash: 0,
    gameOver: false,
    win: false,
    secretMode: false,
    hiddenReveal: 0,
    logs: [],
    audio: null,
    audioNodes: null,
  };

  const themes = ['#79d9ff', '#ffb86c', '#b48df8', '#85ffb2', '#ffd47c'];

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.player.x = width * 0.5;
    state.player.y = height * 0.78;
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function px(n) { return `${Math.round(n)}px`; }

  function addLog(text, level = 1) {
    state.logs.unshift({ text, time: state.time, level });
    if (state.logs.length > 16) state.logs.pop();
  }

  function initAudio() {
    if (state.audio) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const audio = new AudioContext();
    const mainGain = audio.createGain();
    mainGain.gain.value = 0.16;
    mainGain.connect(audio.destination);

    const drone = audio.createOscillator();
    drone.type = 'triangle';
    drone.frequency.value = 52;
    const droneGain = audio.createGain();
    droneGain.gain.value = 0.0045;
    drone.connect(droneGain);
    droneGain.connect(mainGain);
    drone.start();

    const pulse = audio.createOscillator();
    pulse.type = 'square';
    pulse.frequency.value = 88;
    const pulseGain = audio.createGain();
    pulseGain.gain.value = 0;
    pulse.connect(pulseGain);
    pulseGain.connect(mainGain);
    pulse.start();

    const noiseBuf = audio.createBuffer(1, audio.sampleRate * 1.2, audio.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.08;
    const noise = audio.createBufferSource();
    noise.buffer = noiseBuf;
    noise.loop = true;
    const noiseGain = audio.createGain();
    noiseGain.gain.value = 0.0022;
    noise.connect(noiseGain);
    noiseGain.connect(mainGain);
    noise.start();

    state.audio = audio;
    state.audioNodes = { mainGain, pulseGain, droneGain, noiseGain };
  }

  function soundPulse(strength = 0.06, duration = 0.08) {
    if (!state.audioNodes) return;
    const now = state.audio.currentTime;
    const gain = state.audioNodes.pulseGain.gain;
    gain.cancelScheduledValues(now);
    gain.setValueAtTime(0, now);
    gain.linearRampToValueAtTime(strength, now + 0.01);
    gain.linearRampToValueAtTime(0, now + duration);
  }

  function spawnEnemy(type) {
    const x = rand(40, width - 40);
    const y = -20;
    const speed = rand(70, 120) + state.wave * 4;
    const radius = type === 'drone' ? 10 : type === 'bomber' ? 18 : 7;
    const health = type === 'bomber' ? 3 + state.wave * 0.5 : 1;
    const color = type === 'drone' ? '#77d9ff' : type === 'bomber' ? '#ff9d6c' : '#ddff80';
    state.enemies.push({ x, y, vx: rand(-20, 20), vy: speed, radius, health, type, color, timer: rand(0.5, 2), pattern: Math.random() });
  }

  function spawnAnomaly() {
    const x = rand(40, width - 40);
    const y = rand(60, height * 0.45);
    state.anomalies.push({ x, y, r: 14, alpha: 0.08, reveal: 0, visible: false, pulse: 0, secret: Math.random() < 0.18 });
  }

  function fireBullet() {
    if (state.player.cooldown > 0 || state.gameOver) return;
    const speed = 420 + state.player.overdrive * 40;
    const color = state.player.overdrive ? '#ffb274' : '#aef9ff';
    state.bullets.push({ x: state.player.x, y: state.player.y - 18, vx: 0, vy: -speed, r: 4, color, life: 1.2 });
    state.player.cooldown = 0.12;
    soundPulse(0.1, 0.06);
  }

  function scanPulse() {
    state.scan = true;
    addLog('[SCAN] hidden echoes are being probed.', 1);
    state.player.energy = clamp(state.player.energy - 6, 0, 100);
    if (state.player.energy <= 0) addLog('[WARN] energy low. overdrive impossible.', 2);
  }

  function createParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      state.particles.push({ x, y, vx: rand(-120, 120), vy: rand(-120, 120), life: rand(0.4, 1.1), size: rand(1, 3), color });
    }
  }

  function addSecret() {
    state.secrets += 1;
    addLog('[SECRET] deeper resonance detected in the grid.', 2);
    if (state.secrets === 2) addLog('[SECRET] another layer of anomalies is now accessible.', 2);
    if (state.secrets === 4) {
      state.secretMode = true;
      state.eventRate *= 0.78;
      addLog('[SECRET] overdrive matrix unlocked. enemy patterns change.', 3);
    }
  }

  function update(dt) {
    if (!state.started || state.gameOver) return;
    state.time += dt;
    state.player.cooldown = clamp(state.player.cooldown - dt, 0, 1);
    state.anomaly = clamp(state.anomaly + dt * 0.08, 0, 100);

    const dx = (state.keys.ArrowRight || state.keys.KeyD ? 1 : 0) - (state.keys.ArrowLeft || state.keys.KeyA ? 1 : 0);
    const dy = (state.keys.ArrowDown || state.keys.KeyS ? 1 : 0) - (state.keys.ArrowUp || state.keys.KeyW ? 1 : 0);
    const speed = state.player.speed * (state.keys.ShiftLeft || state.keys.ShiftRight ? 1.4 : 1);
    state.player.vx = dx * speed;
    state.player.vy = dy * speed;
    state.player.x = clamp(state.player.x + state.player.vx * dt, 24, width - 24);
    state.player.y = clamp(state.player.y + state.player.vy * dt, height * 0.5, height - 40);
    if (state.keys.Space) fireBullet();
    if (state.scan) {
      state.anomalies.forEach(an => {
        an.visible = true;
        an.reveal = clamp(an.reveal + dt * 1.2, 0, 1);
      });
      state.scan = false;
    }
    if (state.keys.KeyQ && state.time - state.player.lastScan > 0.4) {
      scanPulse();
      state.player.lastScan = state.time;
    }

    state.eventTimer += dt;
    if (state.eventTimer > state.eventRate) {
      state.eventTimer = 0;
      state.wave += 1;
      const count = clamp(2 + Math.floor(state.wave * 0.9), 3, 12);
      for (let i = 0; i < count; i++) spawnEnemy(state.wave % 4 === 0 ? 'bomber' : 'drone');
      if (Math.random() < 0.48) spawnAnomaly();
      if (state.wave % 5 === 0) addLog(`[WAVE] ${state.wave} incoming. the sky trembles.`, 2);
      state.eventRate = clamp(3.2 - state.wave * 0.08, 1.4, 3.8);
    }

    state.bullets = state.bullets.filter(b => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
      return b.life > 0 && b.y > -20;
    });

    state.enemies = state.enemies.filter(e => {
      e.y += e.vy * dt;
      e.x += e.vx * dt;
      e.vx += Math.sin(state.time + e.pattern) * 2 * dt;
      if (e.x < 20 || e.x > width - 20) e.vx *= -1;
      e.timer -= dt;
      if (e.timer <= 0) {
        e.timer = rand(1.2, 2.4);
        if (Math.random() < 0.42) state.beams.push({ x: e.x, y: e.y + e.radius + 6, vx: rand(-10, 10), vy: 220 + state.wave * 6, r: 3, color: '#ff724d' });
      }
      return e.y < height + 40;
    });

    state.beams = state.beams.filter(b => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      return b.y < height + 20;
    });

    state.particles = state.particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      return p.life > 0;
    });

    collideBullets();
    collideBeams();
    updateAnomalies(dt);
    updateOverdrive(dt);
    updatePlayer(dt);
    updateGlitch(dt);
    if (state.player.health <= 0 || state.anomaly >= 100) gameOver();
  }

  function collideBullets() {
    state.bullets.forEach(b => {
      state.enemies.forEach(e => {
        if (Math.hypot(b.x - e.x, b.y - e.y) < b.r + e.radius) {
          b.life = 0;
          e.health -= 1;
          state.score += 8;
          state.flash = 0.18;
          createParticles(e.x, e.y, 6, '#a6f3ff');
          if (e.health <= 0) {
            state.enemies = state.enemies.filter(enemy => enemy !== e);
            state.score += 18;
            addLog('[HIT] enemy destroyed. resonance increased.', 1);
            createParticles(e.x, e.y, 16, '#ff7d6c');
          }
        }
      });
      state.anomalies.forEach(an => {
        if (!an.visible) return;
        if (Math.hypot(b.x - an.x, b.y - an.y) < b.r + an.r) {
          b.life = 0;
          an.pulse = 1;
          an.reveal = 1;
          if (!an.visible) return;
          if (an.secret && !an.hidden) {
            an.hidden = true;
            an.visible = false;
            addSecret();
          } else {
            addLog('[HIT] anomaly disrupted. watch the next wave.', 1);
          }
          state.score += an.secret ? 40 : 14;
          createParticles(an.x, an.y, 10, '#ddff9f');
        }
      });
    });
  }

  function collideBeams() {
    state.beams.forEach(b => {
      if (Math.hypot(b.x - state.player.x, b.y - state.player.y) < b.r + state.player.radius) {
        b.vy = 0;
        b.life = 0;
        state.player.health = clamp(state.player.health - 9 - state.wave * 0.18, 0, 100);
        state.flash = 0.26;
        addLog('[DAMAGE] hull compromised. evade faster.', 2);
        createParticles(state.player.x, state.player.y, 10, '#ff9494');
      }
    });
  }

  function updateAnomalies(dt) {
    state.anomalies = state.anomalies.filter(an => {
      an.pulse = clamp(an.pulse - dt * 1.2, 0, 1);
      if (!an.visible && Math.random() < 0.002) an.visible = true;
      an.alpha = an.visible ? clamp(an.alpha + dt * 0.5, 0.1, 0.32) : clamp(an.alpha - dt * 0.5, 0, 0.08);
      return an.hidden === false || an.visible || an.pulse > 0;
    });
  }

  function updateOverdrive(dt) {
    if (state.keys.ShiftLeft || state.keys.ShiftRight) {
      state.player.overdrive = clamp(state.player.overdrive + dt * 0.9, 0, 1);
      state.player.energy = clamp(state.player.energy - dt * 18, 0, 100);
    } else {
      state.player.overdrive = clamp(state.player.overdrive - dt * 0.8, 0, 1);
    }
    if (state.player.energy < 25) state.anomaly = clamp(state.anomaly + dt * 0.5, 0, 100);
  }

  function updatePlayer(dt) {
    if (state.player.health < 100 && state.player.energy > 48 && !state.keys.Space) {
      state.player.health = clamp(state.player.health + dt * 4, 0, 100);
    }
    if (!state.player.cooldown && state.keys.Space) fireBullet();
  }

  function updateGlitch(dt) {
    state.glitch = clamp(state.glitch - dt * 0.8, 0, 1);
    state.flash = clamp(state.flash - dt * 1.2, 0, 0.5);
  }

  function gameOver() {
    if (state.gameOver) return;
    state.gameOver = true;
    if (state.player.health <= 0) addLog('[END] you were consumed by the skies.', 3);
    else if (state.anomaly >= 100) addLog('[END] anomaly breached the hull. the mission ends.', 3);
    else addLog('[END] mission complete.', 3);
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);
    drawBackground();
    drawGrid();
    drawEntities();
    drawUI();
    drawEffects();
    renderLogs();
    if (!state.started) drawLaunch();
  }

  function drawBackground() {
    const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
    bgGrad.addColorStop(0, '#09101e');
    bgGrad.addColorStop(1, '#04060b');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, width, height);
    for (let i = 0; i < 90; i++) {
      const x = (i * 47 + (state.time * 34)) % width;
      const y = (i * 127) % height;
      ctx.fillStyle = `rgba(120, 204, 255, ${0.04 + Math.sin(state.time + i) * 0.01})`;
      ctx.fillRect(x, y, 2, 2);
    }
  }

  function drawGrid() {
    const spacing = 28;
    ctx.strokeStyle = 'rgba(107, 164, 214, 0.08)';
    ctx.lineWidth = 1;
    for (let x = spacing; x < width; x += spacing) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }
    for (let y = spacing; y < height; y += spacing) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
    }
  }

  function drawEntities() {
    state.anomalies.forEach(an => {
      if (an.visible || an.pulse > 0) {
        const glow = an.pulse * 0.34 + 0.08;
        ctx.fillStyle = `rgba(255, 238, 108, ${an.alpha + glow})`;
        ctx.beginPath(); ctx.arc(an.x, an.y, an.r + 4 * an.reveal, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.22 + glow * 0.4})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.arc(an.x, an.y, an.r + 8 * an.reveal, 0, Math.PI * 2); ctx.stroke();
        if (an.secret && an.visible) {
          ctx.fillStyle = 'rgba(255, 113, 180, 0.24)';
          ctx.beginPath(); ctx.arc(an.x, an.y, an.r + 16, 0, Math.PI*2); ctx.fill();
        }
      }
    });
    state.enemies.forEach(e => {
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 4, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#04060b';
      ctx.font = '10px ui-monospace, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(e.health, e.x, e.y);
    });
    state.bullets.forEach(b => {
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    });
    state.beams.forEach(b => {
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    });
    state.particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = clamp(p.life, 0, 1);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    });
    drawPlayer();
  }

  function drawPlayer() {
    const px = state.player.x;
    const py = state.player.y;
    const trail = state.player.overdrive * 0.7;
    ctx.fillStyle = `rgba(133, 238, 255, ${0.18 + trail * 0.4})`;
    ctx.beginPath(); ctx.arc(px, py + 6, 22 + trail * 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#a9f7ff';
    ctx.beginPath(); ctx.moveTo(px, py - 18); ctx.lineTo(px - 16, py + 16); ctx.lineTo(px + 16, py + 16); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(px, py - 18); ctx.lineTo(px - 16, py + 16); ctx.lineTo(px + 16, py + 16); ctx.closePath(); ctx.stroke();
  }

  function drawUI() {
    waveEl.textContent = state.wave;
    healthEl.textContent = `${Math.round(state.player.health)}%`;
    energyEl.textContent = `${Math.round(state.player.energy)}%`;
    anomalyEl.textContent = `${Math.round(state.anomaly)}%`;
    secretEl.textContent = state.secretMode ? 'ACTIVE' : state.secrets ? `${state.secrets}` : 'NONE';
  }

  function renderLogs() {
    logEl.innerHTML = '';
    state.logs.forEach(log => {
      const age = state.time - log.time;
      const line = document.createElement('div');
      line.className = 'log-line';
      line.textContent = log.text;
      line.style.opacity = clamp(1 - age / 14, 0, 1);
      if (log.level > 1) line.style.color = '#ffd186';
      if (log.level > 2) line.style.color = '#ff9db2';
      logEl.appendChild(line);
    });
  }

  function drawEffects() {
    if (state.flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${state.flash})`;
      ctx.fillRect(0, 0, width, height);
    }
    if (state.secretMode) {
      ctx.strokeStyle = 'rgba(255, 153, 208, 0.12)';
      ctx.lineWidth = 4;
      ctx.setLineDash([14, 9]);
      ctx.strokeRect(6, 6, width - 12, height - 12);
      ctx.setLineDash([]);
    }
    if (state.gameOver) {
      ctx.fillStyle = 'rgba(4, 6, 15, 0.72)';
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = '#ffffff';
      ctx.font = '36px ui-monospace, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(state.player.health <= 0 ? 'YOU CRASHED' : 'ANOMALY OVERLOAD', width / 2, height / 2 - 20);
      ctx.font = '16px ui-monospace, monospace';
      ctx.fillText('Refresh to try again.', width / 2, height / 2 + 24);
    }
  }

  function drawLaunch() {
    ctx.fillStyle = 'rgba(4, 8, 16, 0.72)';
    ctx.fillRect(0, 0, width, height);
  }

  function start() {
    resize();
    state.player.x = width / 2;
    state.player.y = height * 0.78;
    addLog('[SYSTEM] booting neon flight. prepare for waves.', 1);
    addLog('[TIP] Q scans hidden anomalies. shift for a burst.', 1);
    requestAnimationFrame(loop);
  }

  function loop(timestamp) {
    if (!state.lastTime) state.lastTime = timestamp;
    const dt = Math.min(0.033, (timestamp - state.lastTime) / 1000);
    state.lastTime = timestamp;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function keyHandler(e, down) {
    if (!state.started) {
      state.started = true;
      launchEl.style.display = 'none';
      initAudio();
    }
    state.keys[e.code] = down;
    if (down && e.code === 'KeyQ') scanPulse();
    if (down && e.code === 'Space') fireBullet();
  }

  window.addEventListener('keydown', e => { keyHandler(e, true); if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyQ'].includes(e.code)) e.preventDefault(); });
  window.addEventListener('keyup', e => keyHandler(e, false));
  window.addEventListener('mousedown', e => { if (!state.started) { state.started = true; launchEl.style.display = 'none'; initAudio(); } fireBullet(); });
  window.addEventListener('touchstart', e => { if (!state.started) { state.started = true; launchEl.style.display = 'none'; initAudio(); } fireBullet(); }, { passive: true });
  window.addEventListener('resize', resize);

  start();
})();
</script>
</body>
</html>
