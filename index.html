<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Echo Grid</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  :root {
    color-scheme: dark;
    --bg: #04050c;
    --panel: rgba(8, 12, 22, 0.92);
    --text: #b9f3ff;
    --muted: #7fa2b3;
    --accent: #69ffea;
    --focus: #ffd16f;
    --error: #ff6b6b;
    --ghost: #a58cff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at 50% 10%, rgba(77, 96, 163, 0.12), transparent 22%), #04050c; color: var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.01), transparent 24%, transparent 72%, rgba(255,255,255,0.025));
    z-index: 0;
  }
  canvas { position: absolute; inset: 0; display: block; z-index: 1; }
  #panel { position: absolute; left: 18px; top: 18px; z-index: 2; width: min(360px, calc(100vw - 36px)); backdrop-filter: blur(14px); background: var(--panel); border: 1px solid rgba(105, 188, 255, 0.14); box-shadow: 0 0 42px rgba(0,0,0,0.3); padding: 18px 18px 14px; border-radius: 18px; }
  .title { font-size: 0.95rem; letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 12px; opacity: 0.88; }
  .row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
  .label { color: var(--muted); font-variant: petite-caps; letter-spacing: 0.15em; font-size: 0.86rem; }
  .value { text-align: right; font-size: 0.94rem; }
  #log { position: absolute; left: 18px; bottom: 18px; z-index: 2; width: min(420px, calc(100vw - 36px)); max-height: 38vh; overflow: hidden; padding: 16px 18px 16px; border-radius: 18px; background: rgba(6, 10, 18, 0.82); border: 1px solid rgba(115, 223, 255, 0.12); backdrop-filter: blur(10px); font-size: 0.82rem; line-height: 1.5; }
  .line { margin: 0 0 6px; opacity: 0.92; }
  .hint { position: absolute; right: 18px; top: 18px; z-index: 2; padding: 12px 14px; border-radius: 14px; background: rgba(2, 6, 14, 0.76); border: 1px dashed rgba(115, 223, 255, 0.16); font-size: 0.82rem; color: var(--muted); width: min(260px, calc(100vw - 36px)); }
  #hint strong { color: var(--accent); }
  #start { position: absolute; inset: 0; display: grid; place-items: center; z-index: 5; pointer-events: none; font-size: 1.1rem; text-align: center; color: rgba(181, 236, 255, 0.92); }
  #start span { padding: 18px 28px; background: rgba(8, 16, 28, 0.82); border: 1px solid rgba(114, 251, 236, 0.18); border-radius: 999px; box-shadow: 0 0 26px rgba(0,0,0,0.28); }
  @media (max-width: 600px) { #panel, #log, #hint { left: 12px; right: auto; width: calc(100vw - 24px); } #hint { top: auto; bottom: 120px; } }
</style>
</head>
<body>
<canvas id="screen"></canvas>
<div id="panel">
  <div class="title">ECHO GRID</div>
  <div class="row"><span class="label">TUNE PHASE</span><span class="value" id="phaseValue">--</span></div>
  <div class="row"><span class="label">STABILITY</span><span class="value" id="stabilityValue">--</span></div>
  <div class="row"><span class="label">ENERGY</span><span class="value" id="energyValue">--</span></div>
  <div class="row"><span class="label">ANOMALY</span><span class="value" id="anomalyValue">--</span></div>
  <div class="row"><span class="label">TARGET</span><span class="value" id="targetValue">--</span></div>
  <div class="row"><span class="label">OBJECTIVE</span><span class="value" id="objectiveValue">--</span></div>
</div>
<div id="hint"><strong>1-5</strong> phase buttons · <strong>arrows</strong> move · <strong>SPACE</strong> engage · <strong>Q</strong> inspect secret</div>
<div id="log"></div>
<div id="start"><span>Press any key or tap to synchronize the grid.</span></div>
<script>
(() => {
  const canvas = document.getElementById('screen');
  const ctx = canvas.getContext('2d');
  const logEl = document.getElementById('log');
  const startEl = document.getElementById('start');
  const phaseValue = document.getElementById('phaseValue');
  const stabilityValue = document.getElementById('stabilityValue');
  const energyValue = document.getElementById('energyValue');
  const anomalyValue = document.getElementById('anomalyValue');
  const targetValue = document.getElementById('targetValue');
  const objectiveValue = document.getElementById('objectiveValue');

  let width = 0;
  let height = 0;
  let dpr = window.devicePixelRatio || 1;

  const state = {
    started: false,
    time: 0,
    last: 0,
    cursor: { x: 0, y: 0 },
    grid: [],
    rows: 10,
    cols: 10,
    tileSize: 0,
    offsetX: 0,
    offsetY: 0,
    phase: 2,
    stability: 42,
    energy: 82,
    anomaly: 8,
    target: 20,
    activated: 0,
    score: 0,
    scan: 0,
    scanSpeed: 0.22,
    stage: 0,
    secretChain: [],
    secretOpen: false,
    hiddenNodes: 0,
    logs: [],
    completed: false,
    failed: false,
    audio: null,
    audioNodes: null,
    beat: 0,
    lastInspect: 0,
  };

  const phaseNames = ['Void','Pulse','Glide','Ether','Rune','Echo'];
  const phaseColors = ['#5b6a8c','#8ef3ff','#b085ff','#66ffcb','#ffcb6b','#ff9cbc'];

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.tileSize = Math.min(width, height) / 14;
    state.offsetX = (width - state.tileSize * state.cols) / 2;
    state.offsetY = (height - state.tileSize * state.rows) / 2;
  }

  function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
  function rnd(min,max){return Math.random()*(max-min)+min;}

  function buildGrid() {
    state.grid = [];
    for (let y = 0; y < state.rows; y++) {
      for (let x = 0; x < state.cols; x++) {
        const freq = 1 + Math.floor(Math.random() * 5);
        const ghost = Math.random() < 0.12;
        state.grid.push({ x, y, freq, engaged: false, charge: 0, ghost, discovered: !ghost, pulse: 0, hidden: ghost });
      }
    }
    const anchor = state.grid[Math.floor(Math.random()*state.grid.length)];
    anchor.freq = state.phase;
    anchor.engaged = true;
    anchor.discovered = true;
    anchor.hidden = false;
    state.activated = 1;
  }

  function tileAt(x,y){return state.grid.find(t=>t.x===x&&t.y===y);}
  function index(x,y){return y*state.cols+x;}

  function addLog(text, level=1) {
    state.logs.unshift({ text, time: state.time, level });
    if (state.logs.length > 18) state.logs.pop();
  }

  function initAudio() {
    if (state.audio) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const audio = new AudioContext();
    const gain = audio.createGain();
    gain.gain.value = 0.16;
    gain.connect(audio.destination);

    const drone = audio.createOscillator();
    drone.type = 'sawtooth';
    drone.frequency.value = 58;
    const droneGain = audio.createGain();
    droneGain.gain.value = 0.006;
    drone.connect(droneGain);
    droneGain.connect(gain);
    drone.start();

    const pulse = audio.createOscillator();
    pulse.type = 'sine';
    pulse.frequency.value = 120;
    const pulseGain = audio.createGain();
    pulseGain.gain.value = 0;
    pulse.connect(pulseGain);
    pulseGain.connect(gain);
    pulse.start();

    const noise = audio.createBufferSource();
    const buf = audio.createBuffer(1, audio.sampleRate * 1.2, audio.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.08;
    noise.buffer = buf;
    noise.loop = true;
    const noiseGain = audio.createGain();
    noiseGain.gain.value = 0.0018;
    noise.connect(noiseGain);
    noiseGain.connect(gain);
    noise.start();

    state.audio = audio;
    state.audioNodes = { gain, pulseGain, droneGain };
  }

  function pulseSound(strength=0.08,dur=0.08) {
    if (!state.audioNodes) return;
    const t = state.audio.currentTime;
    const pg = state.audioNodes.pulseGain.gain;
    pg.cancelScheduledValues(t);
    pg.setValueAtTime(0, t);
    pg.linearRampToValueAtTime(strength, t + 0.01);
    pg.linearRampToValueAtTime(0, t + dur);
  }

  function setPhase(value) {
    state.phase = clamp(value,1,5);
    addLog(`[PHASE] tuning set to ${phaseNames[state.phase]} (${state.phase})`, 1);
    pulseSound(0.12, 0.1);
  }

  function inspectTile() {
    if (state.failed || state.completed) return;
    const tile = tileAt(state.cursor.x, state.cursor.y);
    if (!tile) return;
    state.lastInspect = state.time;
    if (tile.hidden && !tile.discovered) {
      tile.discovered = true;
      tile.hidden = false;
      addLog('[INSPECT] hidden node surfaced in the echo.', 2);
      state.anomaly += 4;
      state.hiddenNodes += 1;
      if (state.hiddenNodes >= 3 && !state.secretOpen) {
        state.secretOpen = true;
        addLog('[SECRET] a deeper resonance has been exposed.', 3);
        state.target += 4;
      }
      pulseSound(0.18, 0.14);
      return;
    }
    if (tile.engaged) {
      addLog('[INSPECT] this node is actively tuning.', 1);
      return;
    }
    addLog(`[INSPECT] frequency ${tile.freq} detected. align with phase ${state.phase}.`, 1);
  }

  function toggleTile() {
    if (state.failed || state.completed) return;
    const tile = tileAt(state.cursor.x, state.cursor.y);
    if (!tile || tile.hidden) return;
    tile.engaged = !tile.engaged;
    if (tile.engaged) {
      addLog(`[ENGAGED] node ${tile.x},${tile.y} locked to phase ${state.phase}.`, 1);
      if (tile.freq === state.phase) {
        state.score += 12;
      } else {
        state.anomaly += 5;
      }
    } else {
      addLog(`[RELEASE] node ${tile.x},${tile.y} released.`, 1);
    }
    pulseSound(0.14, 0.12);
  }

  function moveCursor(dx,dy) {
    if (state.failed || state.completed) return;
    state.cursor.x = clamp(state.cursor.x + dx, 0, state.cols - 1);
    state.cursor.y = clamp(state.cursor.y + dy, 0, state.rows - 1);
  }

  function updateGrid(dt) {
    state.scan += dt * state.scanSpeed;
    if (state.scan > state.cols) {
      state.scan -= state.cols;
      state.stage += 1;
      addLog('[SCAN] sweep complete. resonance patterns are shifting.', 1);
      if (Math.random() < 0.18) state.anomaly += 2;
      if (state.stage % 3 === 0) state.energy -= 3;
      if (state.stage === 6) state.target += 2;
    }

    const lineX = Math.floor(state.scan);
    state.grid.forEach(tile => {
      if (!tile.engaged) {
        if (tile.charge > 0) tile.charge = clamp(tile.charge - dt * 0.2, 0, 1);
        return;
      }
      const match = tile.freq === state.phase;
      const over = tile.freq !== state.phase;
      const withinWave = Math.abs(tile.x - lineX) < 1;
      if (withinWave) {
        if (match) {
          tile.charge = clamp(tile.charge + dt * 0.32, 0, 1);
          state.stability = clamp(state.stability + dt * 0.9, 0, 100);
          state.score += 1;
        } else {
          tile.charge = clamp(tile.charge + dt * 0.18, 0, 1);
          state.anomaly = clamp(state.anomaly + dt * 1.8, 0, 120);
          state.stability = clamp(state.stability - dt * 0.8, 0, 100);
        }
      }
      if (tile.charge > 0.96 && match && !tile.settled) {
        tile.settled = true;
        state.activated += 1;
        state.score += 22;
        addLog('[RESOLVE] node stabilized by coherent phase alignment.', 2);
      }
    });

    if (state.energy > 0) state.energy = clamp(state.energy - dt * 0.14, 0, 100);
    if (state.anomaly > 0 && state.anomaly < 100 && state.energy < 28) state.anomaly = clamp(state.anomaly + dt * 0.7, 0, 120);
    if (state.stability < 20) state.anomaly = clamp(state.anomaly + dt * 0.5, 0, 120);

    if (!state.completed && !state.failed) {
      if (state.energy <= 0) {
        state.failed = true;
        addLog('[FAIL] power drains. the echo collapses into static.', 3);
      }
      if (state.anomaly >= 100) {
        state.failed = true;
        addLog('[FAIL] anomaly saturated. the grid repels your touch.', 3);
      }
      if (state.activated >= state.target) {
        state.completed = true;
        addLog('[SUCCESS] resonance threshold met. hidden frequencies hum softly.', 3);
      }
    }
  }

  function draw() {
    ctx.clearRect(0,0,width,height);
    drawBackground();
    drawGrid();
    drawCursor();
    drawScan();
    drawOverlay();
    renderHud();
    renderLogs();
  }

  function drawBackground() {
    const grad = ctx.createRadialGradient(width*0.5, height*0.3, 0, width*0.5, height*0.3, height*0.9);
    grad.addColorStop(0, 'rgba(50, 86, 133, 0.16)');
    grad.addColorStop(1, '#04050c');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,width,height);
    for (let i = 0; i < 12; i++) {
      const alpha = 0.02 + Math.sin(state.time*0.8 + i) * 0.01;
      ctx.strokeStyle = `rgba(116, 208, 255, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(width/2, height/2, 120 + i*42, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  function drawGrid() {
    state.grid.forEach(tile => {
      const x = state.offsetX + tile.x * state.tileSize;
      const y = state.offsetY + tile.y * state.tileSize;
      const s = state.tileSize * 0.92;
      const cx = x + state.tileSize * 0.5;
      const cy = y + state.tileSize * 0.5;
      const radius = s * 0.42;

      const base = tile.hidden && !tile.discovered ? 'rgba(90, 100, 140, 0.18)' : `rgba(${28 + tile.freq*35}, ${84 + tile.freq*30}, ${172 - tile.freq*18}, 0.18)`;
      ctx.fillStyle = base;
      ctx.beginPath();
      ctx.roundRect(x + state.tileSize*0.04, y + state.tileSize*0.04, s, s, 14);
      ctx.fill();

      if (tile.hidden && !tile.discovered) {
        ctx.strokeStyle = 'rgba(180, 200, 255, 0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();
        return;
      }

      ctx.strokeStyle = tile.engaged ? `rgba(255,255,255,0.8)` : 'rgba(120, 190, 255, 0.16)';
      ctx.lineWidth = tile.engaged ? 2.4 : 1.2;
      ctx.beginPath();
      ctx.roundRect(x + state.tileSize*0.06, y + state.tileSize*0.06, s*0.88, s*0.88, 12);
      ctx.stroke();

      const fillColor = tile.engaged ? `rgba(${22 + tile.freq*43}, ${180 - tile.freq*20}, ${255 - tile.freq*30}, 0.95)` : `rgba(255,255,255,0.14)`;
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = tile.engaged ? '#04050c' : '#b5f1ff';
      ctx.font = `${Math.round(state.tileSize*0.28)}px ui-monospace, monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tile.freq, cx, cy);

      if (tile.charge > 0.03) {
        ctx.strokeStyle = `rgba(255,255,255,${0.12 + tile.charge * 0.28})`;
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius + 12, 0, Math.PI*2 * tile.charge);
        ctx.stroke();
      }
      if (tile.settled) {
        ctx.strokeStyle = 'rgba(255, 224, 145, 0.65)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius + 18, 0, Math.PI*2);
        ctx.stroke();
      }
    });
  }

  function drawCursor() {
    const x = state.offsetX + state.cursor.x * state.tileSize;
    const y = state.offsetY + state.cursor.y * state.tileSize;
    const s = state.tileSize * 0.96;
    ctx.strokeStyle = 'rgba(189, 255, 255, 0.96)';
    ctx.lineWidth = 2.6;
    ctx.beginPath();
    ctx.roundRect(x + state.tileSize*0.02, y + state.tileSize*0.02, s, s, 16);
    ctx.stroke();

    ctx.fillStyle = 'rgba(105, 235, 255, 0.06)';
    ctx.fillRect(x + state.tileSize*0.02, y + state.tileSize*0.02, s, s);
  }

  function drawScan() {
    const sweep = (state.scan / state.cols) * (state.tileSize * state.cols);
    ctx.fillStyle = 'rgba(120, 232, 255, 0.06)';
    ctx.fillRect(state.offsetX + sweep, state.offsetY, 22, state.tileSize * state.rows);
    ctx.fillStyle = 'rgba(120, 232, 255, 0.14)';
    ctx.fillRect(state.offsetX + sweep + 22, state.offsetY, 6, state.tileSize * state.rows);
  }

  function drawOverlay() {
    if (state.failed) {
      ctx.fillStyle = 'rgba(4, 8, 18, 0.62)';
      ctx.fillRect(0,0,width,height);
      ctx.fillStyle = 'rgba(255,110,110,0.92)';
      ctx.font = '38px ui-monospace, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GRID FRACTURED', width/2, height/2);
    }
    if (state.completed) {
      ctx.fillStyle = 'rgba(2, 8, 14, 0.68)';
      ctx.fillRect(0,0,width,height);
      ctx.fillStyle = 'rgba(159, 255, 222, 0.94)';
      ctx.font = '38px ui-monospace, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('RESIDUE SYNCHRONIZED', width/2, height/2);
    }
  }

  function renderHud() {
    phaseValue.textContent = `${phaseNames[state.phase]} (${state.phase})`;
    stabilityValue.textContent = `${Math.round(state.stability)}%`;
    energyValue.textContent = `${Math.round(state.energy)}%`;
    anomalyValue.textContent = `${Math.round(state.anomaly)}%`;
    targetValue.textContent = `${state.activated}/${state.target}`;
    objectiveValue.textContent = state.failed ? 'COLLAPSE' : state.completed ? 'HARMONY' : 'align nodes to the current phase';
  }

  function renderLogs() {
    logEl.innerHTML = '';
    state.logs.forEach(entry => {
      const age = state.time - entry.time;
      const opacity = clamp(1 - age / 16, 0, 1);
      const line = document.createElement('div');
      line.className = 'line';
      line.textContent = entry.text;
      line.style.opacity = opacity;
      if (entry.level > 1) line.style.color = 'rgba(255, 176, 95, 0.96)';
      if (entry.level > 2) line.style.color = 'rgba(255, 165, 165, 0.96)';
      logEl.appendChild(line);
    });
  }

  function loop(timestamp) {
    if (!state.last) state.last = timestamp;
    const dt = Math.min(0.033, (timestamp - state.last) / 1000);
    state.last = timestamp;
    if (state.started) updateGrid(dt);
    state.time += dt;
    draw();
    requestAnimationFrame(loop);
  }

  function startGame() {
    state.started = true;
    startEl.style.display = 'none';
    initAudio();
    addLog('[SYSTEM] echo grid activated. tune carefully.', 1);
  }

  function initInput() {
    window.addEventListener('keydown', e => {
      if (!state.started) startGame();
      if (e.code === 'ArrowUp') moveCursor(0,-1);
      if (e.code === 'ArrowDown') moveCursor(0,1);
      if (e.code === 'ArrowLeft') moveCursor(-1,0);
      if (e.code === 'ArrowRight') moveCursor(1,0);
      if (e.code === 'Space') toggleTile();
      if (e.code === 'KeyQ') inspectTile();
      if (e.code === 'Digit1') setPhase(1);
      if (e.code === 'Digit2') setPhase(2);
      if (e.code === 'Digit3') setPhase(3);
      if (e.code === 'Digit4') setPhase(4);
      if (e.code === 'Digit5') setPhase(5);
      if (e.code === 'KeyR' && !state.failed && !state.completed) {
        state.energy = clamp(state.energy + 12, 0, 100);
        addLog('[RECHARGE] energy injected into the lattice.', 1);
        pulseSound(0.18, 0.16);
      }
    });
    canvas.addEventListener('mousedown', e => {
      if (!state.started) startGame();
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left);
      const my = (e.clientY - rect.top);
      const x = Math.floor((mx - state.offsetX) / state.tileSize);
      const y = Math.floor((my - state.offsetY) / state.tileSize);
      if (x >= 0 && x < state.cols && y >= 0 && y < state.rows) {
        state.cursor.x = x;
        state.cursor.y = y;
        toggleTile();
      }
    });
    canvas.addEventListener('touchstart', e => {
      if (!state.started) startGame();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const mx = (touch.clientX - rect.left);
      const my = (touch.clientY - rect.top);
      const x = Math.floor((mx - state.offsetX) / state.tileSize);
      const y = Math.floor((my - state.offsetY) / state.tileSize);
      if (x >= 0 && x < state.cols && y >= 0 && y < state.rows) {
        state.cursor.x = x;
        state.cursor.y = y;
        toggleTile();
      }
    }, { passive: false });
  }

  resize();
  buildGrid();
  initInput();
  requestAnimationFrame(loop);
  window.addEventListener('resize', resize);
})();
</script>
</body>
</html>
